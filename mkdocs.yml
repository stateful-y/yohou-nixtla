site_name: Yohou-Nixtla
site_description: A Nixtla integration for Yohou
site_url: https://yohou-nixtla.readthedocs.io/
repo_url: https://github.com/stateful-y/yohou-nixtla
repo_name: stateful-y/yohou-nixtla
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/material/overrides
  favicon: assets/favicon.png
  logo: assets/logo.png

  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - sane_lists
  - toc:
      permalink: true
      # API member pages carry two levels of section heading: the class's own
      # (h3) and each method's (h5). Only the first belongs in the table of
      # contents -- listing every method's Parameters/Returns/Source Code turns a
      # class page's ToC into a wall. The hooks used to get this by building
      # `page.toc` by hand and simply not adding them; now that the headings are
      # real, `toc_depth` is what draws the same line. The h5 anchors still
      # exist and are still linkable -- this only controls what the sidebar lists.
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      # Without these two, `#12` and `@octocat` render as literal text. The
      # extension was declared bare, so only bare-URL autolinking worked and
      # the issue/PR/user shorthand -- the reason to enable magiclink on a
      # project that lives on GitHub -- silently did nothing.
      repo_url_shorthand: true
      social_url_shorthand: true
      user: stateful-y
      repo: yohou-nixtla
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      # Ordered: docs-relative includes win, but a page can still reach the
      # repo root (e.g. CHANGELOG.md).  Do not narrow this to [docs] -- a
      # project may legitimately include a file from src/ or the repo root.
      base_path:
        - docs
        - .
      # Without this a missing include is dropped silently, rendering a page
      # that looks deliberate and is empty.
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - class: mermaid
          name: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      # `pymdownx.emoji` declared bare defaults to the EmojiOne index, which
      # points at `cdnjs.cloudflare.com/.../emojione/2.2.7/` -- a CDN path that
      # has been dead since 2017. Every emoji on every generated site was a
      # broken image, in every engine, and nothing warned.
      #
      # Deliberately `pymdownx.emoji.twemoji`, not `material.extensions.emoji.
      # twemoji`. Material's index adds `:material-*:` icon shortcodes, which
      # this template does not use anywhere, and naming it would bind the
      # markdown config to the theme package. The pymdownx index ships with a
      # dependency the template already declares.
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  # Resolves the docs markers (<!-- API_TABLE -->, <!-- SUBPAGES -->, gallery and
  # companion placeholders) at markdown level, so they render under any engine --
  # the `hooks:` key that used to do this is not executed by the successor engine.
  # Loaded by module name at config time, which the `dev-mode-dirs = ["."]` wheel
  # target makes possible (it puts the repo root on the editable install's path).
  - docs_build._markers
  # Links the first occurrence of each opted-in glossary term to its definition,
  # at markdown level so it runs under any engine (this replaced the on_page_content
  # hook). Registers above the markers so it only ever links author prose, never
  # the HTML tables and cards they inject.
  - docs_build._glossary

extra_javascript:
  - javascripts/readthedocs.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/2.2.2/js/dataTables.min.js

extra_css:
  - stylesheets/theme.css
  - https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css
  - stylesheets/gallery.css


exclude_docs: |
  api-submodule.html
  # The template's build tooling (hooks.py and its siblings) no longer lives
  # under docs_dir -- it moved to docs_build/, so mkdocs cannot see it to publish
  # it, and none of the entries here are what protects it. Deleting them would
  # not leak the build tooling; the location does that.
  #
  # `*.py` and `__pycache__/` remain for a different reason: a project may keep
  # its OWN script under docs/ (yohou has docs/precache_datasets.py), and mkdocs
  # would publish it as a static asset. These entries cover that case.
  *.py
  __pycache__/
  # Same reason, one directory over: `docs/material/templates/` holds
  # mkdocstrings template overrides, which are build tooling, not pages. Without
  # this they are published as static assets -- confirmed live, `class.html.jinja`
  # served 200 from the docs site. `material/overrides/*.html` leaks the same way
  # and is excluded here too; `api-submodule.html` above was the one instance of
  # this that had been noticed before, handled one file at a time.
  *.jinja
  material/overrides/*.html
  examples/**/CLAUDE.md


not_in_nav: |
  assets/README.md
  pages/api/*.md
  pages/api/generated/*.md

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore  # Ignore absolute links - we handle them in hooks
    unrecognized_links: ignore  # Ignore unrecognized links - examples HTML is generated

plugins:
  - search
  - tags
  - autorefs
  - mkdocstrings:
      custom_templates: docs/material/templates
      # Overrides live in docs/material/templates/python/material/. Each one is a
      # thin `{% extends %}` over the shipped `_base/` template, so upstream
      # fixes keep arriving -- see the header comments in those files for why the
      # dispatcher is overridden rather than the nine section templates.
      #
      # NOTE: this is a PLUGIN-level key, not a handler option. Putting it under
      # `handlers.python.options` fails the build with
      # `PythonOptions.__init__() got an unexpected keyword argument`.
      handlers:
        python:
          paths: [src]
          inventories:
            # Resolves standard-library types in signatures and See Also
            # entries.  Add your dependencies' inventories here too, e.g.
            #   - https://numpy.org/doc/stable/objects.inv
            - https://docs.python.org/3/objects.inv
          options:
            # Griffe extensions run during collection. `_see_also` rewrites
            # numpydoc "See Also" blocks into markdown cross-references before the
            # docstring is rendered, so autorefs links them -- replacing the HTML
            # post-processing the docs hooks used to do.
            extensions:
              - docs_build/_see_also.py
              - docs_build/_source_links.py
            docstring_style: numpy
            docstring_options:
              warn_unknown_params: false
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            signature_crossrefs: true
            scoped_crossrefs: true
            relative_crossrefs: true

nav:
  - Home: index.md
  - Tutorials:
    - pages/tutorials/index.md
    - Getting Started: pages/tutorials/getting-started.md
  - How-to Guides:
    - pages/how-to/index.md
    - Choose the Right Forecaster: pages/how-to/choose-forecaster.md
    - Work with Panel Data: pages/how-to/panel-data.md
    - Use Exogenous Features: pages/how-to/exogenous-features.md
    - Integrate with Yohou: pages/how-to/integrate-yohou.md
    - Troubleshooting: pages/how-to/troubleshooting.md
    - Contributing: pages/how-to/contribute.md
  - Examples:
    - pages/examples/index.md
  - Explanation:
    - pages/explanation/index.md
    - Concepts: pages/explanation/concepts.md
  # Reference is last on purpose: it is the section you arrive at knowing what
  # you want, so it earns its place by being findable, not by being passed
  # through. Everything above it is read in roughly the order a newcomer needs
  # it -- learn, do, see, understand -- and reference is where you stop reading
  # and start looking things up.
  - Reference:
    - pages/reference/index.md
    - API Reference: pages/reference/api.md
    - Changelog: pages/reference/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stateful-y/yohou-nixtla

watch:
  # Just `docs`, on purpose. The engine watches only its own source directory;
  # the live-preview watcher in docs_build/serve.py owns `src/` (a source edit
  # regenerates the API pages under docs/pages/api/, which are in `docs` and so
  # trigger a rebuild). Watching `src` here too would fire a second, stale
  # rebuild before regeneration completes -- and the successor engine cannot
  # watch `src` at all (it refuses paths outside the project folder), so an
  # engine that watches `src` was never the portable answer. Run `just serve`
  # (which runs the watcher); raw `mkdocs serve` gives a static preview.
  #
  # Deliberately NOT `mkdocs.yml`. MkDocs already watches its own config during
  # `serve`, so listing it buys nothing -- and under Zensical a config file
  # naming itself in `watch:` makes the build emit ZERO html, silently, at
  # exit 0, even under `--strict`. Re-adding it would publish an empty site
  # from a green build, in every repo at once.
  - docs
