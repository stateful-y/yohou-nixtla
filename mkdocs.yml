site_name: Yohou-Nixtla
site_description: A Nixtla integration for Yohou
site_url: https://yohou-nixtla.readthedocs.io/
repo_url: https://github.com/stateful-y/yohou-nixtla
repo_name: stateful-y/yohou-nixtla
edit_uri: edit/main/docs/

hooks:
  - docs/hooks.py

theme:
  name: material
  custom_dir: docs/material/overrides
  favicon: assets/favicon.png
  logo: assets/logo.png

  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - sane_lists
  - toc:
      permalink: true
      # API member pages carry two levels of section heading: the class's own
      # (h3) and each method's (h5). Only the first belongs in the table of
      # contents -- listing every method's Parameters/Returns/Source Code turns a
      # class page's ToC into a wall. The hooks used to get this by building
      # `page.toc` by hand and simply not adding them; now that the headings are
      # real, `toc_depth` is what draws the same line. The h5 anchors still
      # exist and are still linkable -- this only controls what the sidebar lists.
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      # Ordered: docs-relative includes win, but a page can still reach the
      # repo root (e.g. CHANGELOG.md).  Do not narrow this to [docs] -- a
      # project may legitimately include a file from src/ or the repo root.
      base_path:
        - docs
        - .
      # Without this a missing include is dropped silently, rendering a page
      # that looks deliberate and is empty.
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - class: mermaid
          name: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji

extra_javascript:
  - javascripts/readthedocs.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/2.2.2/js/dataTables.min.js

extra_css:
  - stylesheets/theme.css
  - https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css
  - stylesheets/gallery.css


exclude_docs: |
  api-submodule.html
  # The build steps live in docs/ so mkdocs can load hooks.py by path and the
  # hooks can import their siblings. mkdocs treats every non-page file under
  # docs_dir as a static asset, so without this it publishes the build tooling's
  # source -- and its bytecode -- to the documentation site. That was already
  # true of hooks.py before the steps were split out; splitting them made it
  # four modules instead of one, which is what made it visible.
  *.py
  __pycache__/
  examples/**/CLAUDE.md


not_in_nav: |
  assets/README.md
  pages/api/*.md
  pages/api/generated/*.md

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore  # Ignore absolute links - we handle them in hooks
    unrecognized_links: ignore  # Ignore unrecognized links - examples HTML is generated

plugins:
  - search
  - tags
  - autorefs
  - mkdocstrings:
      custom_templates: docs/material/templates
      # Overrides live in docs/material/templates/python/material/. Each one is a
      # thin `{% extends %}` over the shipped `_base/` template, so upstream
      # fixes keep arriving -- see the header comments in those files for why the
      # dispatcher is overridden rather than the nine section templates.
      #
      # NOTE: this is a PLUGIN-level key, not a handler option. Putting it under
      # `handlers.python.options` fails the build with
      # `PythonOptions.__init__() got an unexpected keyword argument`.
      handlers:
        python:
          paths: [src]
          inventories:
            # Resolves standard-library types in signatures and See Also
            # entries.  Add your dependencies' inventories here too, e.g.
            #   - https://numpy.org/doc/stable/objects.inv
            - https://docs.python.org/3/objects.inv
          options:
            docstring_style: numpy
            docstring_options:
              warn_unknown_params: false
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            signature_crossrefs: true
            scoped_crossrefs: true
            relative_crossrefs: true

nav:
  - Home: index.md
  - Tutorials:
    - pages/tutorials/index.md
    - Getting Started: pages/tutorials/getting-started.md
  - How-to Guides:
    - pages/how-to/index.md
    - Choose the Right Forecaster: pages/how-to/choose-forecaster.md
    - Work with Panel Data: pages/how-to/panel-data.md
    - Use Exogenous Features: pages/how-to/exogenous-features.md
    - Integrate with Yohou: pages/how-to/integrate-yohou.md
    - Troubleshooting: pages/how-to/troubleshooting.md
    - Contributing: pages/how-to/contribute.md
  - Examples:
    - pages/examples/index.md
  - Explanation:
    - pages/explanation/index.md
    - Concepts: pages/explanation/concepts.md
  # Reference is last on purpose: it is the section you arrive at knowing what
  # you want, so it earns its place by being findable, not by being passed
  # through. Everything above it is read in roughly the order a newcomer needs
  # it -- learn, do, see, understand -- and reference is where you stop reading
  # and start looking things up.
  - Reference:
    - pages/reference/index.md
    - API Reference: pages/reference/api.md
    - Changelog: pages/reference/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stateful-y/yohou-nixtla

watch:
  - mkdocs.yml
  - docs
  # The API pages are generated from the package source, so a source edit must
  # trigger a rebuild -- otherwise adding a class shows nothing until restart.
  - src
  - examples
