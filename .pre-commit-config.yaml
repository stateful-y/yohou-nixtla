repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # uv.lock is an intentionally-tracked generated lockfile that exceeds the 500 KB default.
        exclude: ^uv\.lock$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending


  # Enforce conventional commit messages
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.3.0
    hooks:
      - id: commitizen
        stages: [commit-msg]


  # Version-sensitive linters run from the project environment so their single
  # source of truth is uv.lock. --locked makes a stale uv.lock fail loudly
  # instead of silently diverging from CI. (Dependabot's "uv" ecosystem then
  # keeps them updated in lockstep; nothing floats on a frozen pre-commit rev.)
  - repo: local
    hooks:
      # Docstring coverage
      - id: interrogate
        name: interrogate
        entry: uv run --locked interrogate
        language: system
        types: [python]
        files: ^src/
        exclude: .*_version\.py$
        require_serial: true

      # Ruff linter (autofix)
      - id: ruff
        name: ruff
        entry: uv run --locked ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

      # Ruff formatter
      - id: ruff-format
        name: ruff-format
        entry: uv run --locked ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

      # Markdown linter
      - id: rumdl
        name: rumdl check
        entry: uv run --locked rumdl check .
        language: system
        types: [markdown]
        pass_filenames: false
        require_serial: true

      # Markdown formatter (fixes fixable violations, fails on the rest)
      - id: rumdl-fmt
        name: rumdl format
        entry: uv run --locked rumdl check --fix .
        language: system
        types: [markdown]
        pass_filenames: false
        require_serial: true

      # Type checking with ty. Projects with optional-dependency code paths can
      # add `--extra <name>` here so ty resolves them instead of warning.
      - id: ty
        name: ty
        entry: uv run --locked ty check src
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        require_serial: true
