# `install` creates only the pre-commit hook unless told otherwise, so commitizen's
# `stages: [commit-msg]` hook was declared but never installed -- the gate existed on
# paper and never once ran. Naming both types here is what makes `prek install` wire up
# the commit-msg hook that validates the message a single-commit PR ships.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # prek's built-in Rust implementations, declared explicitly. Pointing these at
  # pre-commit/pre-commit-hooks would be a lie: prek swaps its builtins in for that
  # repo's hooks and ignores `rev` while doing it, so the pin would govern nothing.
  # What actually pins these is prek's own version in uv.lock.
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # uv.lock is an intentionally-tracked generated lockfile that exceeds the 500 KB default.
        exclude: ^uv\.lock$
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending


  # Enforce conventional commit messages
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.3.0
    hooks:
      - id: commitizen
        stages: [commit-msg]


  # Version-sensitive linters run from the project environment so their single
  # source of truth is uv.lock. --locked makes a stale uv.lock fail loudly
  # instead of silently diverging from CI. (Dependabot's "uv" ecosystem then
  # keeps them updated in lockstep; nothing floats on a frozen pre-commit rev.)
  #
  # That last clause is now literally true: every hook above resolves from uv.lock,
  # via prek's version for the builtins and via `uv run --locked` for these. The one
  # exception is commitizen, which has no builtin and no reason to live in the dev
  # environment -- it runs at commit-msg only, so prek builds its env lazily rather
  # than every contributor paying 16 packages for it.
  - repo: local
    hooks:
      # Docstring coverage
      - id: interrogate
        name: interrogate
        entry: uv run --locked interrogate
        language: system
        types: [python]
        files: ^src/
        exclude: .*_version\.py$
        require_serial: true

      # Ban reStructuredText citation syntax in docstrings. numpydoc "References"
      # sections must use a markdown ordered list with plain `[1]` prose citations,
      # never RST (`.. [1]` definitions or `[1]_` references) -- griffe hands the
      # section to mkdocstrings as raw text, so RST renders literally on the API
      # page. The docs build normalizes it anyway, but catching it at author time
      # keeps the source clean. `pygrep` is built into prek, so this adds no
      # dependency; it fails when either form matches.
      - id: no-rst-citations
        name: no reStructuredText citation syntax in docstrings
        description: Use a markdown ordered list and plain `[1]` citations, not RST `.. [1]` / `[1]_`.
        language: pygrep
        entry: '(^\s*\.\. \[|\[[^]]+\]_)'
        types: [python]
        files: ^src/

      # Ruff linter (autofix)
      - id: ruff
        name: ruff
        entry: uv run --locked ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

      # Ruff formatter
      - id: ruff-format
        name: ruff-format
        entry: uv run --locked ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true

      # Markdown linter
      - id: rumdl
        name: rumdl check
        entry: uv run --locked rumdl check .
        language: system
        types: [markdown]
        pass_filenames: false
        require_serial: true

      # Markdown formatter (fixes fixable violations, fails on the rest)
      - id: rumdl-fmt
        name: rumdl format
        entry: uv run --locked rumdl check --fix .
        language: system
        types: [markdown]
        pass_filenames: false
        require_serial: true

      # Type checking with ty. Projects with optional-dependency code paths can
      # add `--extra <name>` here so ty resolves them instead of warning.
      - id: ty
        name: ty
        entry: uv run --locked ty check src
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        require_serial: true
